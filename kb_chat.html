<!DOCTYPE html>
<html>
<head>
    <title>Motherson Knowledge Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f8f9fb;
            color: #1f2937;
            height: 100vh;
        }

        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #b91c1c, #ffffff);
        }

        .login-card {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.18);
        }

        .login-card h1 {
            color: #b91c1c;
            margin-bottom: 5px;
        }

        .login-card p {
            color: #6b7280;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            margin-top: 8px;
            margin-bottom: 12px;
            outline: none;
        }

        button {
            background: #b91c1c;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 9px;
            cursor: pointer;
        }

        button:hover {
            background: #991b1b;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .app {
            display: none;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid #e5e7eb;
            padding: 18px;
            overflow-y: auto;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 20px;
            font-weight: bold;
            color: #b91c1c;
        }

        .user-info {
            font-size: 13px;
            color: #4b5563;
        }

        h2, h3 {
            margin-top: 0;
            color: #111827;
        }

        .small-btn {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .secondary-btn {
            background: #374151;
        }

        .secondary-btn:hover {
            background: #1f2937;
        }

        .danger-btn {
            background: #dc2626;
        }

        .folder-box, .search-box, .section-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .status {
            font-size: 13px;
            color: #6b7280;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .error {
            color: #dc2626;
            font-size: 13px;
        }

        .success {
            color: #15803d;
            font-size: 13px;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .collapse-btn {
            width: auto;
            padding: 6px 10px;
            font-size: 12px;
            background: #ef4444;
        }

        .doc-item, .session-item {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #b91c1c;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .session-item {
            cursor: pointer;
        }

        .session-item:hover {
            background: #fef2f2;
        }

        .doc-name {
            font-weight: bold;
            word-break: break-word;
        }

        .doc-meta {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
            line-height: 1.5;
        }

        .status-pill {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            margin-top: 6px;
            font-weight: bold;
        }

        .ready {
            background: #dcfce7;
            color: #166534;
        }

        .indexing {
            background: #fef3c7;
            color: #92400e;
        }

        .pending {
            background: #dbeafe;
            color: #1e40af;
        }

        .failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #f8f9fb;
        }

        .message {
            max-width: 78%;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user {
            background: #b91c1c;
            color: white;
            margin-left: auto;
        }

        .assistant {
            background: white;
            border: 1px solid #e5e7eb;
            margin-right: auto;
            color: #111827;
        }

        .typing {
            opacity: 0.7;
            font-style: italic;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .input-area input {
            margin: 0;
        }

        .sources-box {
            margin-top: 12px;
            border-top: 1px solid #e5e7eb;
            padding-top: 10px;
            font-size: 13px;
        }

        .source-link {
            display: block;
            color: #b91c1c;
            text-decoration: none;
            margin-top: 6px;
            font-weight: bold;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .copy-btn {
            background: #374151;
            font-size: 12px;
            padding: 6px 10px;
            margin-top: 8px;
        }

        hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 18px 0;
        }

        .empty-state {
            color: #6b7280;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="login-page" id="loginPage">
        <div class="login-card">
            <h1>Motherson</h1>
            <p>Enterprise Knowledge Assistant</p>

            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="admin@motherson.com">

            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Password">

            <button class="small-btn" onclick="login()">Login</button>

            <div id="loginStatus" class="error"></div>

            <p style="font-size:12px;color:#6b7280;margin-top:14px;">
                Default: admin@motherson.com / admin123
            </p>
        </div>
    </div>

    <div class="app" id="appPage">
        <div class="sidebar">
            <h2>Motherson KB</h2>

            <button class="small-btn" onclick="newChat()">+ New Chat</button>
            <button class="small-btn danger-btn" onclick="logout()">Logout</button>

            <hr>

            <h3>Knowledge Folder</h3>
            <div class="folder-box">
                <input type="text" id="folderInput" placeholder="Paste folder path here">
                <button class="small-btn" onclick="setKnowledgeFolder()">Save Folder</button>
                <button class="small-btn secondary-btn" onclick="indexNow()">Index Now</button>
                <div id="folderStatus" class="status"></div>
            </div>

            <hr>

            <h3>Upload Documents</h3>
            <input type="file" id="fileInput" multiple accept=".pdf,.docx,.xlsx,.csv,.pptx,.txt,.md">
            <button class="small-btn" onclick="uploadFiles()">Upload</button>
            <div id="uploadStatus" class="status"></div>

            <hr>

            <div class="doc-header">
                <h3>Documents</h3>
                <button class="collapse-btn" onclick="toggleDocsPanel()" id="docsToggleBtn">Collapse</button>
            </div>

            <div id="docsPanel">
                <button class="small-btn secondary-btn" onclick="loadDocuments()">Refresh Documents</button>

                <div class="search-box">
                    <label>
                        <input type="checkbox" id="selectAllDocs" onchange="toggleAllDocuments()">
                        Search all ready documents
                    </label>
                </div>

                <div id="documentsList"></div>
            </div>

            <hr>

            <h3>Chat History</h3>
            <button class="small-btn secondary-btn" onclick="loadSessions()">Refresh History</button>
            <div id="sessionsList"></div>
        </div>

        <div class="main">
            <div class="topbar">
                <div class="brand">Enterprise Knowledge Assistant</div>
                <div class="user-info" id="userInfo">Logged in</div>
            </div>

            <div class="chat-box" id="chatBox">
                <div class="message assistant">
Hi! Select ready documents or search all ready documents, then ask a question.
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="questionInput" placeholder="Ask a question..." onkeydown="handleEnter(event)">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let documents = [];
        let autoRefreshTimer = null;
        let docsCollapsed = false;

        async function checkLogin() {
            try {
                const response = await fetch("/me");
                if (!response.ok) throw new Error("Not logged in");

                const data = await response.json();
                showApp(data.employee);
            } catch {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById("loginPage").style.display = "flex";
            document.getElementById("appPage").style.display = "none";
        }

        async function showApp(employee) {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("appPage").style.display = "flex";
            document.getElementById("userInfo").innerText =
                `${employee.name} | ${employee.role}`;

            await loadKnowledgeFolder();
            await loadDocuments();
            await loadSessions();

            startDocumentAutoRefresh();
        }

        async function login() {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const status = document.getElementById("loginStatus");

            status.innerText = "";

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email, password})
                });

                if (!response.ok) {
                    status.innerText = "Invalid email or password.";
                    return;
                }

                const data = await response.json();
                showApp(data.employee);

            } catch (error) {
                status.innerText = "Login failed.";
                console.error(error);
            }
        }

        async function logout() {
            await fetch("/logout", {method: "POST"});
            currentSessionId = null;
            showLogin();
        }

        async function loadKnowledgeFolder() {
            try {
                const response = await fetch("/knowledge-folder");
                const data = await response.json();

                document.getElementById("folderInput").value = data.folder_path || "";
                document.getElementById("folderStatus").innerText =
                    "Current folder: " + (data.folder_path || "Not set");
            } catch (error) {
                document.getElementById("folderStatus").innerText = "Could not load folder.";
            }
        }

        async function setKnowledgeFolder() {
            const folderPath = document.getElementById("folderInput").value.trim();
            const status = document.getElementById("folderStatus");

            if (!folderPath) {
                status.innerText = "Please enter a folder path.";
                return;
            }

            try {
                const response = await fetch("/set-knowledge-folder", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({folder_path: folderPath})
                });

                const data = await response.json();

                status.innerText = data.message;

                if (data.success) {
                    await loadDocuments();
                }

            } catch (error) {
                status.innerText = "Failed to save folder.";
                console.error(error);
            }
        }

        async function indexNow() {
            const status = document.getElementById("folderStatus");
            status.innerText = "Manual indexing started...";

            try {
                const response = await fetch("/index-now", {
                    method: "POST"
                });

                const data = await response.json();
                status.innerText = data.message;

                setTimeout(loadDocuments, 3000);

            } catch (error) {
                status.innerText = "Manual indexing failed.";
                console.error(error);
            }
        }

        function toggleDocsPanel() {
            docsCollapsed = !docsCollapsed;
            document.getElementById("docsPanel").style.display = docsCollapsed ? "none" : "block";
            document.getElementById("docsToggleBtn").innerText = docsCollapsed ? "Expand" : "Collapse";
        }

        function getStatusIcon(status) {
            if (status === "ready") return "🟢";
            if (status === "indexing") return "🟡";
            if (status === "pending") return "🔵";
            if (status === "failed") return "🔴";
            return "⚪";
        }

        function getStatusClass(status) {
            if (status === "ready") return "ready";
            if (status === "indexing") return "indexing";
            if (status === "pending") return "pending";
            if (status === "failed") return "failed";
            return "pending";
        }

        function isReady(doc) {
            return (doc.indexing_status || "ready") === "ready";
        }

        async function loadDocuments() {
            try {
                const response = await fetch("/documents");

                if (!response.ok) {
                    document.getElementById("documentsList").innerHTML =
                        "<p class='error'>Please login again.</p>";
                    return;
                }

                const data = await response.json();
                documents = data.documents || [];

                const list = document.getElementById("documentsList");
                list.innerHTML = "";

                if (documents.length === 0) {
                    list.innerHTML = "<p class='empty-state'>No documents indexed yet.</p>";
                    return;
                }

                documents.forEach(doc => {
                    const status = doc.indexing_status || "ready";
                    const statusIcon = getStatusIcon(status);
                    const statusClass = getStatusClass(status);
                    const disabled = isReady(doc) ? "" : "disabled";

                    const div = document.createElement("div");
                    div.className = "doc-item";

                    div.innerHTML = `
                        <label>
                            <input type="checkbox" class="doc-check" value="${doc.document_id}" ${disabled}>
                            <span class="doc-name">${statusIcon} ${doc.filename}</span>
                        </label>

                        <div class="doc-meta">
                            ID: ${doc.document_id}<br>
                            Version: ${doc.version}<br>
                            Chunks: ${doc.chunks}
                        </div>

                        <span class="status-pill ${statusClass}">
                            ${status.toUpperCase()}
                        </span>

                        ${
                            doc.error_message
                            ? `<div class="error">Error: ${doc.error_message}</div>`
                            : ""
                        }
                    `;

                    list.appendChild(div);
                });

                toggleAllDocuments();

            } catch (error) {
                console.error(error);
            }
        }

        function startDocumentAutoRefresh() {
            if (autoRefreshTimer) return;

            autoRefreshTimer = setInterval(async () => {
                await loadDocuments();
            }, 10000);
        }

        function toggleAllDocuments() {
            const selectAll = document.getElementById("selectAllDocs").checked;
            const checks = document.querySelectorAll(".doc-check");

            checks.forEach(check => {
                const docId = parseInt(check.value);
                const doc = documents.find(d => d.document_id === docId);

                check.checked = false;

                if (!doc || !isReady(doc)) {
                    check.disabled = true;
                } else {
                    check.disabled = selectAll;
                }
            });
        }

        function getSelectedDocumentIds() {
            const selectAll = document.getElementById("selectAllDocs").checked;

            if (selectAll) return [];

            const selected = [];

            document.querySelectorAll(".doc-check:checked").forEach(check => {
                selected.push(parseInt(check.value));
            });

            return selected;
        }

        function hasReadyDocuments() {
            return documents.some(doc => isReady(doc));
        }

        function validateBeforeSend() {
            const selectAll = document.getElementById("selectAllDocs").checked;
            const selectedIds = getSelectedDocumentIds();

            if (!hasReadyDocuments()) {
                addMessage("assistant", "No ready documents are available yet. Please index documents first.");
                return false;
            }

            if (!selectAll && selectedIds.length === 0) {
                addMessage("assistant", "Please select at least one ready document, or enable Search all ready documents.");
                return false;
            }

            return true;
        }

        function buildUploadStatusMessage(data) {
            let messages = [];

            if (data.results && data.results.length > 0) {
                data.results.forEach(result => {
                    if (result.status === "skipped_duplicate") {
                        messages.push(`${result.filename}: Already exists in knowledge base.`);
                    } else if (result.status === "skipped_unchanged") {
                        messages.push(`${result.filename}: Already indexed and unchanged.`);
                    } else if (result.status === "queued_new_document") {
                        messages.push(`${result.filename}: Uploaded. Indexing started.`);
                    } else if (result.status === "queued_for_reindexing") {
                        messages.push(`${result.filename}: Updated file detected. Re-indexing started.`);
                    } else if (result.status === "already_processing") {
                        messages.push(`${result.filename}: Already processing.`);
                    } else {
                        messages.push(`${result.filename}: ${result.message || result.status}`);
                    }
                });
            }

            return messages.length ? messages.join("\n") : data.message;
        }

        async function uploadFiles() {
            const input = document.getElementById("fileInput");
            const status = document.getElementById("uploadStatus");

            if (input.files.length === 0) {
                status.innerText = "Please select files first.";
                return;
            }

            const formData = new FormData();

            for (let file of input.files) {
                formData.append("files", file);
            }

            status.innerText = "Uploading files...";

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                status.innerText = buildUploadStatusMessage(data);
                input.value = "";

                await loadDocuments();

            } catch (error) {
                status.innerText = "Upload failed.";
                console.error(error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById("questionInput");
            const sendBtn = document.getElementById("sendBtn");
            const question = input.value.trim();

            if (!question) return;
            if (!validateBeforeSend()) return;

            const selectedDocumentIds = getSelectedDocumentIds();

            addMessage("user", question);
            input.value = "";

            addMessage("assistant typing", "Thinking...");
            sendBtn.disabled = true;

            const payload = {
                question: question,
                session_id: currentSessionId,
                document_ids: selectedDocumentIds
            };

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                currentSessionId = data.session_id;

                removeLastAssistantThinking();

                addAssistantAnswer(data.answer, data.sources || []);

                await loadSessions();

            } catch (error) {
                removeLastAssistantThinking();
                addMessage("assistant", "Something went wrong while generating the answer.");
                console.error(error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, text) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message " + role;
            div.innerText = text;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addAssistantAnswer(answer, sources) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message assistant";

            const answerDiv = document.createElement("div");
            answerDiv.innerText = answer;
            div.appendChild(answerDiv);

            const copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.innerText = "Copy answer";
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(answer);
                copyBtn.innerText = "Copied";
                setTimeout(() => copyBtn.innerText = "Copy answer", 1200);
            };
            div.appendChild(copyBtn);

            if (sources.length > 0) {
                const sourcesBox = document.createElement("div");
                sourcesBox.className = "sources-box";
                sourcesBox.innerHTML = "<strong>Sources used</strong>";

                sources.forEach(source => {
                    const link = document.createElement("a");
                    link.className = "source-link";
                    link.href = source.download_url;
                    link.innerText = "⬇ " + source.filename;
                    link.target = "_blank";
                    sourcesBox.appendChild(link);
                });

                div.appendChild(sourcesBox);
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeLastAssistantThinking() {
            const messages = document.querySelectorAll(".message.assistant, .message.typing");

            if (messages.length === 0) return;

            const last = messages[messages.length - 1];

            if (last.innerText === "Thinking...") {
                last.remove();
            }
        }

        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        async function newChat() {
            currentSessionId = null;

            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = "";

            addMessage("assistant", "New chat started. Select documents and ask your question.");
        }

        async function loadSessions() {
            try {
                const response = await fetch("/sessions");
                if (!response.ok) return;

                const data = await response.json();

                const list = document.getElementById("sessionsList");
                list.innerHTML = "";

                if (!data.sessions || data.sessions.length === 0) {
                    list.innerHTML = "<p class='empty-state'>No chat history yet.</p>";
                    return;
                }

                data.sessions.forEach(session => {
                    const div = document.createElement("div");
                    div.className = "session-item";
                    div.innerText = session.title;
                    div.onclick = () => loadSessionMessages(session.session_id);
                    list.appendChild(div);
                });

            } catch (error) {
                console.error(error);
            }
        }

        async function loadSessionMessages(sessionId) {
            currentSessionId = sessionId;

            try {
                const response = await fetch(`/sessions/${sessionId}/messages`);
                const data = await response.json();

                const chatBox = document.getElementById("chatBox");
                chatBox.innerHTML = "";

                data.messages.forEach(msg => {
                    addMessage(msg.role === "user" ? "user" : "assistant", msg.message);
                });

            } catch (error) {
                addMessage("assistant", "Failed to load this chat session.");
                console.error(error);
            }
        }

        window.onload = checkLogin;
    </script>

</body>
</html>
